<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KeepyCash — Opening app…</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #1a1a1a;
            color: #f5f3ee;
        }
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 40px 24px;
            text-align: center;
        }
        .wordmark {
            font-size: 22px;
            font-weight: 600;
            letter-spacing: -0.02em;
            color: #1D9E75;
            margin-bottom: 24px;
        }
        p.status {
            font-size: 15px;
            opacity: 0.6;
            margin-bottom: 32px;
        }
        .download-prompt {
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 14px;
            width: 100%;
            max-width: 300px;
        }
        .download-prompt.visible { display: flex; }
        .download-prompt .sub {
            font-size: 14px;
            opacity: 0.5;
            margin-bottom: 4px;
        }
        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            padding: 16px 28px;
            border-radius: 14px;
            font-size: 15px;
            font-weight: 500;
            letter-spacing: -0.01em;
            text-decoration: none;
            transition: opacity 0.15s, transform 0.1s;
            border: none;
            cursor: pointer;
            background: #1D9E75;
            color: #f5f3ee;
        }
        .btn:hover { opacity: 0.9; }
        .btn:active { transform: scale(0.97); }
    </style>
</head>
<body>

<div class="wordmark">KeepyCash</div>
<p class="status" id="status">Opening KeepyCash…</p>

<div class="download-prompt" id="download-prompt">
    <p class="sub">Didn't open automatically? Get the app to sign in.</p>
    <a class="btn" href="/download.html">Download now</a>
</div>

<script>
    // Supabase sends tokens in the URL hash for implicit flow
    // Redirect into the native app via custom scheme
    var hash = window.location.hash;
    var search = window.location.search;
    var deepLink = 'keepycash://signin' + (hash || search);
    window.location.replace(deepLink);

    // If the deep link doesn't take (app not installed, or the user
    // cancels the "Open in KeepyCash?" prompt), the browser stays on
    // this page — show a fallback to the download page after a beat.
    setTimeout(function () {
        document.getElementById('status').textContent = "Didn't work?";
        document.getElementById('download-prompt').classList.add('visible');
    }, 2000);
</script>
</body>
</html>
