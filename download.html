<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Download KeepyCash</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #1a1a1a;
    color: #f5f3ee;
  }
  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 40px 24px;
    text-align: center;
  }
  .wordmark {
    font-size: 22px;
    font-weight: 600;
    letter-spacing: -0.02em;
    color: #1D9E75;
    margin-bottom: 48px;
  }
  .headline {
    font-size: 38px;
    font-weight: 600;
    letter-spacing: -0.03em;
    line-height: 1.15;
    max-width: 340px;
    margin-bottom: 16px;
  }
  .sub {
    font-size: 17px;
    line-height: 1.6;
    opacity: 0.5;
    max-width: 300px;
    margin-bottom: 52px;
  }
  .buttons {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    width: 100%;
    max-width: 300px;
  }
  .btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    width: 100%;
    padding: 16px 28px;
    border-radius: 14px;
    font-size: 15px;
    font-weight: 500;
    letter-spacing: -0.01em;
    text-decoration: none;
    transition: opacity 0.15s, transform 0.1s;
    border: none;
    cursor: pointer;
  }
  .btn:active { transform: scale(0.97); }
  .btn-apple {
    background: #f5f3ee;
    color: #1a1a1a;
  }
  .btn-apple:hover { opacity: 0.9; }
  .btn-android {
    background: rgba(255,255,255,0.07);
    color: rgba(245,243,238,0.4);
    cursor: default;
    pointer-events: none;
  }
  .btn svg { flex-shrink: 0; }
  .coming-soon {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    background: rgba(29,158,117,0.15);
    color: #1D9E75;
    padding: 3px 9px;
    border-radius: 100px;
    margin-left: 4px;
  }
  .android-waitlist {
    margin-top: 20px;
    width: 100%;
    max-width: 300px;
    text-align: center;
  }
  .waitlist-link {
    background: none;
    border: none;
    color: #1D9E75;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    text-decoration: underline;
    text-underline-offset: 3px;
    opacity: 0.85;
    padding: 0;
    font-family: inherit;
  }
  .waitlist-link:hover { opacity: 1; }
  .waitlist-form {
    display: flex;
    gap: 8px;
    margin-top: 14px;
    width: 100%;
  }
  .waitlist-form input {
    flex: 1;
    padding: 12px 16px;
    border: 1.5px solid rgba(255,255,255,0.15);
    border-radius: 10px;
    font-size: 14px;
    background: rgba(255,255,255,0.07);
    color: #f5f3ee;
    outline: none;
    font-family: inherit;
    transition: border-color 0.2s;
  }
  .waitlist-form input::placeholder { color: rgba(245,243,238,0.35); }
  .waitlist-form input:focus { border-color: #1D9E75; }
  .waitlist-form button {
    padding: 12px 16px;
    background: #1D9E75;
    color: #fff;
    border: none;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    font-family: inherit;
    white-space: nowrap;
    transition: opacity 0.15s;
  }
  .waitlist-form button:hover { opacity: 0.85; }
  .waitlist-form button:disabled { opacity: 0.5; cursor: default; }
  .waitlist-success {
    margin-top: 12px;
    font-size: 14px;
    color: #1D9E75;
  }
  .redirect-note {
    margin-top: 36px;
    font-size: 12px;
    opacity: 0.25;
    letter-spacing: 0.01em;
  }
  footer {
    position: fixed;
    bottom: 24px;
    font-size: 12px;
    opacity: 0.2;
    letter-spacing: 0.01em;
  }
</style>
</head>
<body>

<div class="wordmark">KeepyCash</div>

<h1 class="headline">Spend less.<br>Keep more.</h1>
<p class="sub">Track every dollar. See exactly where it goes. Free to start.</p>

<div class="buttons">
  <a class="btn btn-apple" id="apple-btn" href="https://apps.apple.com/us/app/keepycash-budget-planner/id6760102114">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
      <path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/>
    </svg>
    Download on the App Store
  </a>

  <div class="btn btn-android">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
      <path d="M17.523 15.341l1.092 1.891a.5.5 0 0 1-.183.683.5.5 0 0 1-.683-.183l-1.108-1.918A6.97 6.97 0 0 1 12 17a6.97 6.97 0 0 1-4.641-1.186L6.251 17.732a.5.5 0 0 1-.866-.5l1.092-1.891A6.994 6.994 0 0 1 5 10h14a6.994 6.994 0 0 1-1.477 5.341zM8.5 13a1 1 0 1 0 0-2 1 1 0 0 0 0 2zm7 0a1 1 0 1 0 0-2 1 1 0 0 0 0 2zM3.305 8.553l-1.86-3.22a.5.5 0 0 1 .866-.5l1.883 3.26A7.018 7.018 0 0 1 12 6a7.018 7.018 0 0 1 7.806 2.093l1.883-3.26a.5.5 0 1 1 .866.5l-1.86 3.22A6.973 6.973 0 0 1 22 10H2a6.973 6.973 0 0 1 1.305-1.447z"/>
    </svg>
    Google Play &nbsp;<span class="coming-soon">Coming soon</span>
  </div>
</div>

<div class="android-waitlist">
  <button class="waitlist-link" id="waitlist-toggle" onclick="showAndroidWaitlist()">Join Android waitlist</button>
  <div class="waitlist-form" id="android-form" style="display:none">
    <input type="email" placeholder="your@email.com" id="android-email" />
    <button onclick="handleAndroidSignup()">Notify me</button>
  </div>
  <div class="waitlist-success" id="android-success" style="display:none">
    You're on the Android waitlist!
  </div>
</div>

<p class="redirect-note" id="redirect-note"></p>

<footer>keepycash.com</footer>

<script>
  const IOS_URL = 'https://apps.apple.com/us/app/keepycash-budget-planner/id6760102114';
  const ua = navigator.userAgent;
  const isIOS = /iPhone|iPad|iPod/i.test(ua);
  const isAndroid = /Android/i.test(ua);

  if (isIOS) {
    document.getElementById('redirect-note').textContent = 'Redirecting you to the App Store…';
    setTimeout(() => { window.location.href = IOS_URL; }, 800);
  }

  const SUPABASE_URL = 'https://nwdiwonrskdluigqwjbm.supabase.co';
  const SUPABASE_ANON_KEY = 'sb_publishable_WctlTXMnpCSW_i0LuStx9g_fq4atrcG';

  function showAndroidWaitlist() {
    document.getElementById('waitlist-toggle').style.display = 'none';
    document.getElementById('android-form').style.display = 'flex';
    document.getElementById('android-email').focus();
  }

  async function handleAndroidSignup() {
    const input = document.getElementById('android-email');
    const btn = input.nextElementSibling;
    const email = input.value.trim();
    if (!email || !email.includes('@')) { input.focus(); return; }

    btn.textContent = 'Saving...';
    btn.disabled = true;

    try {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/waitlist`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'apikey': SUPABASE_ANON_KEY,
          'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
          'Prefer': 'return=minimal'
        },
        body: JSON.stringify({ email })
      });
      if (!res.ok && res.status !== 409) throw new Error('Signup failed');
      document.getElementById('android-form').style.display = 'none';
      document.getElementById('android-success').style.display = 'block';
    } catch (e) {
      btn.textContent = 'Try again';
      btn.disabled = false;
      input.style.borderColor = 'red';
    }
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Enter' && document.getElementById('android-form').style.display !== 'none') {
      handleAndroidSignup();
    }
  });
</script>
</body>
</html>
