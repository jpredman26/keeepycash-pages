<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KeepyCash - How To</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0F2027;
      color: #EDEDED;
      min-height: 100vh;
      padding: 64px 24px;
    }

    .page {
      max-width: 880px;
      margin: 0 auto;
    }

    .page-header {
      text-align: center;
      margin-bottom: 48px;
    }

    .logo { font-size: 48px; margin-bottom: 12px; }

    h1 {
      font-size: 28px;
      font-weight: 800;
      color: #EDEDED;
      margin-bottom: 8px;
    }

    .page-sub {
      font-size: 15px;
      color: #aaa;
    }

    /* ---- Reusable "how-to" block: phone-framed gif + steps ---- */
    .howto {
      background: #203A43;
      border-radius: 24px;
      padding: 40px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
      display: flex;
      gap: 40px;
      align-items: center;
    }

    .howto + .howto { margin-top: 32px; }

    .howto-frame {
      flex: 0 0 auto;
    }

    /* Phone frame that crops/holds the gif */
    .phone {
      width: 220px;
      aspect-ratio: 296 / 640;
      background: #000;
      border-radius: 32px;
      padding: 10px;
      box-shadow:
        0 0 0 2px rgba(255,255,255,0.08),
        0 20px 40px rgba(0,0,0,0.5);
      position: relative;
    }

    .phone::before {
      /* notch */
      content: "";
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      width: 70px;
      height: 18px;
      background: #000;
      border-radius: 0 0 12px 12px;
      z-index: 2;
    }

    .phone img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 24px;
      display: block;
    }

    .howto-content {
      flex: 1 1 auto;
      text-align: left;
    }

    .howto-eyebrow {
      font-size: 13px;
      font-weight: 700;
      color: #0A84FF;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: 8px;
    }

    .howto-title {
      font-size: 22px;
      font-weight: 800;
      margin-bottom: 12px;
    }

    .howto-desc {
      font-size: 14px;
      color: #ccc;
      line-height: 1.6;
      margin-bottom: 20px;
    }

    .howto-steps {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .howto-steps li {
      display: flex;
      gap: 12px;
      font-size: 14px;
      color: #EDEDED;
      line-height: 1.5;
    }

    .step-num {
      flex: 0 0 auto;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: #0A84FF;
      color: #fff;
      font-size: 12px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .howto-steps.bulleted { gap: 10px; }

    .step-dot {
      flex: 0 0 auto;
      width: 8px;
      height: 8px;
      margin-top: 7px;
      border-radius: 50%;
      background: #0A84FF;
    }

    .howto-state {
      text-align: center;
      color: #aaa;
      font-size: 14px;
      padding: 40px 0;
    }

    @media (max-width: 640px) {
      .howto {
        flex-direction: column;
        padding: 28px 24px;
      }
      .howto-content { text-align: center; }
      .howto-steps li { text-align: left; }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="page-header">
      <div class="logo">💰</div>
      <h1>How To</h1>
      <p class="page-sub">Quick walkthroughs for common KeepyCash actions.</p>
    </div>

    <div id="howto-root">
      <div class="howto-state">Loading…</div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = 'https://nwdiwonrskdluigqwjbm.supabase.co'
    const SUPABASE_KEY = 'sb_publishable_WctlTXMnpCSW_i0LuStx9g_fq4atrcG'

    function escapeHtml(str) {
      const div = document.createElement('div')
      div.textContent = str ?? ''
      return div.innerHTML
    }

    function renderHowto(page) {
      const steps = Array.isArray(page.steps) ? page.steps : []
      const stepsHtml = page.list_type === 'bulleted'
        ? `<ul class="howto-steps bulleted">${steps.map(s => `<li><span class="step-dot"></span> ${escapeHtml(s)}</li>`).join('')}</ul>`
        : `<ol class="howto-steps">${steps.map((s, i) => `<li><span class="step-num">${i + 1}</span> ${escapeHtml(s)}</li>`).join('')}</ol>`

      return `
        <div class="howto">
          <div class="howto-frame">
            <div class="phone">
              <img src="assets/gifs/${encodeURIComponent(page.slug)}.gif" alt="Walkthrough of ${escapeHtml(page.title)}" onerror="this.closest('.phone').style.background='#111'" />
            </div>
          </div>
          <div class="howto-content">
            ${page.category ? `<div class="howto-eyebrow">${escapeHtml(page.category)}</div>` : ''}
            <div class="howto-title">${escapeHtml(page.title)}</div>
            ${page.description ? `<p class="howto-desc">${escapeHtml(page.description)}</p>` : ''}
            ${stepsHtml}
          </div>
        </div>
      `
    }

    async function loadHowtos() {
      const root = document.getElementById('howto-root')
      const params = new URLSearchParams(window.location.search)
      const slug = params.get('page')

      if (!slug) {
        root.innerHTML = `<div class="howto-state">Trouble loading this help article. Please check the link and try again.</div>`
        return
      }

      const url = `${SUPABASE_URL}/rest/v1/help_pages?select=*&slug=eq.${encodeURIComponent(slug)}`

      try {
        const res = await fetch(url, {
          headers: {
            apikey: SUPABASE_KEY,
            Authorization: `Bearer ${SUPABASE_KEY}`
          }
        })
        if (!res.ok) throw new Error(`Request failed: ${res.status}`)
        const pages = await res.json()

        if (!pages.length) {
          root.innerHTML = `<div class="howto-state">No how-to found for "${escapeHtml(slug)}".</div>`
          return
        }

        root.innerHTML = pages.map(renderHowto).join('')
      } catch (err) {
        root.innerHTML = `<div class="howto-state">Trouble loading this help article. Please try again later.</div>`
        console.error(err)
      }
    }

    loadHowtos()
  </script>
</body>
</html>
