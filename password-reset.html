<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KeppyCash - Password Reset</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0F2027;
      color: #EDEDED;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: #203A43;
      border-radius: 24px;
      padding: 40px 32px;
      max-width: 400px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
      text-align: center;
    }

    .logo { font-size: 56px; margin-bottom: 16px; }

    h1 {
      font-size: 26px;
      font-weight: 800;
      color: #EDEDED;
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 14px;
      color: #aaa;
      margin-bottom: 24px;
    }

    .form-group {
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      color: #ccc;
      margin-bottom: 8px;
    }

    input {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      background: rgba(255,255,255,0.06);
      color: #EDEDED;
      font-size: 14px;
      transition: border-color 0.2s;
    }

    input:focus {
      outline: none;
      border-color: rgba(10, 132, 255, 0.4);
    }

    button {
      width: 100%;
      padding: 12px 16px;
      background: #0A84FF;
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    button:hover {
      opacity: 0.9;
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .message {
      margin-top: 16px;
      padding: 12px;
      border-radius: 12px;
      font-size: 14px;
      display: none;
    }

    .message.success {
      background: rgba(48, 209, 88, 0.2);
      color: #30D158;
      border: 1px solid rgba(48, 209, 88, 0.4);
    }

    .message.error {
      background: rgba(255, 59, 48, 0.2);
      color: #FF3B30;
      border: 1px solid rgba(255, 59, 48, 0.4);
    }

    .hidden {
      display: none;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">💰</div>
    <h1>KeepyCash</h1>
    <!-- Request Reset Form -->
    <div id="request-form" class="hidden">
      <h1>Reset Password</h1>
      <p class="subtitle">Enter your email to receive a password reset link</p>

      <form id="reset-email-form">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" required />
        </div>
        <button type="submit" id="submit-btn">Send Reset Link</button>
      </form>

      <div id="message" class="message"></div>
    </div>

    <!-- Change Password Form -->
    <div id="change-form" class="hidden">
      <h1>Set New Password</h1>
      <p class="subtitle">Enter your new password</p>

      <form id="change-password-form">
        <div class="form-group">
          <label for="password">New Password</label>
          <input type="password" id="password" required minlength="8" />
        </div>
        <div class="form-group">
          <label for="password-confirm">Confirm Password</label>
          <input type="password" id="password-confirm" required minlength="8" />
        </div>
        <button type="submit" id="change-btn">Update Password</button>
      </form>

      <div id="change-message" class="message"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    // Initialize Supabase
    const SUPABASE_URL = 'https://nwdiwonrskdluigqwjbm.supabase.co'
    const SUPABASE_KEY = 'sb_publishable_WctlTXMnpCSW_i0LuStx9g_fq4atrcG'
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY)

    // Check if user has a valid session (coming from reset email)
    async function checkSession() {
      const { data } = await supabaseClient.auth.getSession()
      if (data.session) {
        // User is authenticated from reset link, show change password form
        showChangeForm()
      } else {
        // Show request reset form
        showRequestForm()
      }
    }

    function showRequestForm() {
      document.getElementById('request-form').classList.remove('hidden')
      document.getElementById('change-form').classList.add('hidden')
    }

    function showChangeForm() {
      document.getElementById('request-form').classList.add('hidden')
      document.getElementById('change-form').classList.remove('hidden')
    }

    function showMessage(elementId, message, type) {
      const el = document.getElementById(elementId)
      el.textContent = message
      el.className = `message ${type}`
      el.style.display = 'block'
    }

    // Handle password reset request
    document.getElementById('reset-email-form').addEventListener('submit', async (e) => {
      e.preventDefault()
      const email = document.getElementById('email').value
      const submitBtn = document.getElementById('submit-btn')

      submitBtn.disabled = true
      try {
        await supabaseClient.auth.resetPasswordForEmail(email, {
          redirectTo: `${window.location.origin}${window.location.pathname}`
        })
        showMessage('message', 'Check your email for the reset link', 'success')
        document.getElementById('email').value = ''
      } catch (error) {
        showMessage('message', error.message || 'Error sending reset link', 'error')
      } finally {
        submitBtn.disabled = false
      }
    })

    // Handle password change
    document.getElementById('change-password-form').addEventListener('submit', async (e) => {
      e.preventDefault()
      const password = document.getElementById('password').value
      const passwordConfirm = document.getElementById('password-confirm').value

      if (password !== passwordConfirm) {
        showMessage('change-message', 'Passwords do not match', 'error')
        return
      }

      const changeBtn = document.getElementById('change-btn')
      changeBtn.disabled = true

      try {
        await supabaseClient.auth.updateUser({ password })
        showMessage('change-message', 'Password updated successfully! Redirecting...', 'success')
        setTimeout(() => window.location.href = '/', 2000)
      } catch (error) {
        showMessage('change-message', error.message || 'Error updating password', 'error')
      } finally {
        changeBtn.disabled = false
      }
    })

    // Check session on page load
    checkSession()
  </script>
</body>
</html>
